services:
  # ── Backend: FastAPI (Python 3.11) ────────────────────────────────────────
  - type: web
    name: et-ai-trader-backend
    runtime: python
    region: singapore          # closest to India for low latency
    plan: starter              # upgrade to standard for production

    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /health

    envVars:
      # ── App ──────────────────────────────────────────────────────────────
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1             # Limit to 1 worker to save RAM (512MB limit)
      - key: MALLOC_TRIM_THRESHOLD_
        value: 100000         # Force memory release to OS
      - key: PYTHONOPTIMIZE
        value: 1             # Slight memory reduction and speed-up

      # ── CORS — set to your frontend URL after first deploy ───────────────
      # Replace the placeholder with your actual Render frontend URL
      # e.g. https://et-ai-trader-frontend.onrender.com
      - key: CORS_ORIGINS
        value: https://et-ai-trader-frontend.onrender.com

      # ── Supabase (required) ───────────────────────────────────────────────
      - key: SUPABASE_URL
        sync: false            # set manually in Render dashboard
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

      # ── LLM Providers (add at least one) ─────────────────────────────────
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

      # ── Model selection ───────────────────────────────────────────────────
      - key: MODEL
        value: groq/llama-3.3-70b-versatile
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: OPENROUTER_MODEL
        value: openai/gpt-4o-mini

      # ── News & Finance APIs ───────────────────────────────────────────────
      - key: NEWS_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false
      - key: FINNHUB_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false

      # ── Optional ──────────────────────────────────────────────────────────
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false
      - key: RAG_VECTOR_DB_PATH
        value: /tmp/storage/vector_indices  # ephemeral disk on Render free tier

  # ── Frontend: React + Vite (Static Site) ──────────────────────────────────
  - type: web
    name: et-ai-trader-frontend
    runtime: static
    region: singapore

    buildCommand: npm install && npm run build
    staticPublishPath: dist

    pullRequestPreviewsEnabled: true

    headers:
      # Security headers
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin

    routes:
      # SPA fallback — all routes serve index.html (required for React Router)
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # ── Supabase (public keys — safe to expose) ───────────────────────────
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false

      # ── Backend API URL ───────────────────────────────────────────────────
      # Set this to your backend service URL from Render dashboard
      # e.g. https://et-ai-trader-backend.onrender.com
      - key: VITE_API_BASE_URL
        sync: false